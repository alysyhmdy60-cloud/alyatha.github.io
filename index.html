<title>مؤسسة اليثى للتشطيبات</title>

<style>
body {
  margin:0;
  font-family: Arial;
  direction:rtl;
  background:#0f0f0f;
  color:#fff;
}

/* هيدر */
header {
  background:linear-gradient(45deg,#000,#222);
  text-align:center;
  padding:60px 20px;
}
header h1 {
  color:#C9A14A;
  font-size:32px;
}
header p {
  font-size:18px;
}

/* منيو */
nav {
  background:#C9A14A;
  text-align:center;
  padding:12px;
}
nav a {
  color:#fff;
  margin:8px;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
}

/* الأقسام */
.section {
  padding:50px 20px;
}
.section h2 {
  text-align:center;
  color:#C9A14A;
}

/* الصور */
.gallery {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.gallery img {
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}

/* عرض */
.offer {
  background:#C9A14A;
  color:#000;
  text-align:center;
  padding:30px;
  border-radius:10px;
  font-size:20px;
}

/* زر واتساب */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:22px;
}

/* فوتر */
footer {
  background:#000;
  text-align:center;
  padding:20px;
}

/* 📱 موبايل */
@media(max-width:768px){
  .gallery {
    grid-template-columns:repeat(2,1fr);
  }
  header h1 {
    font-size:24px;
  }
}

/* 💻 شاشات كبيرة */
@media(min-width:1200px){
  .gallery {
    grid-template-columns:repeat(5,1fr);
  }
}
</style>

</head>
